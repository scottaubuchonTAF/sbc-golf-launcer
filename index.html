<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>SBC Golf</title>
<!-- iPhone home-screen icon (Apps Script can't set this; this launcher can) -->
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="SBC Golf">
<meta name="theme-color" content="#0b1f33">
<style>
html,body{height:100%;margin:0}
body{
  background:linear-gradient(180deg,#0b1f33,#081726);color:#fff;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:18px;text-align:center;
  font:16px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
}
.logo{background:#fff;border-radius:28px;padding:22px 26px;box-shadow:0 8px 28px rgba(0,0,0,.35);
  width:min(78vw,300px)}
.logo img{display:block;width:100%;height:auto}
a.btn{
  background:#2e87d6;color:#fff;text-decoration:none;font-weight:700;
  border-radius:99px;padding:13px 30px;font-size:16px;margin-top:6px;
}
.hint{color:#92a6bb;font-size:12.5px;max-width:300px}
.spin{width:22px;height:22px;border:3px solid rgba(255,255,255,.25);border-top-color:#fff;
  border-radius:50%;animation:sp 1s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="logo"><img src="logo.png" alt="SBC Golf"></div>
<div class="spin" id="spin"></div>
<a class="btn" id="open" href="#" style="display:none">Open SBC Golf</a>
<div class="hint" id="hint">To add to your phone: open this page, tap Share → Add to Home Screen.</div>
<script>
/* ⬇️ PASTE YOUR APPS SCRIPT WEB APP /exec URL BETWEEN THE QUOTES ⬇️ */
var APP_URL = 'https://script.google.com/macros/s/AKfycbz-Fy3EiLy43LePFvMvYj95rPrRtWrGsJH3rBC3YW0HyRZXjuguf7E1q3ymfd7yJvi8pw/exec';
/* ⬆️ ------------------------------------------------------------- ⬆️ */

var qs = location.search;
var standalone = navigator.standalone === true ||
  (window.matchMedia && matchMedia('(display-mode: standalone)').matches);
/* ?setup suppresses the auto-redirect in a normal browser tab (so you can
   Add to Home Screen). Launched FROM the home-screen icon it still redirects. */
var setup = qs.indexOf('setup') !== -1 && !standalone;
var ready = APP_URL && APP_URL.indexOf('PASTE_') === -1;

document.getElementById('open').href = ready ? APP_URL : '#';

if (!ready) {
  /* URL not filled in yet — just show the splash, no redirect. */
  document.getElementById('spin').style.display = 'none';
  document.getElementById('hint').textContent = 'Set APP_URL in index.html to finish setup.';
} else if (setup) {
  document.getElementById('spin').style.display = 'none';
  document.getElementById('open').style.display = '';
} else {
  setTimeout(function(){ location.replace(APP_URL); }, 400);
}
</script>
</body>
</html>
